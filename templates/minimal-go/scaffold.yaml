name: "minimal-go"
version: "0.0.1"
author: "structify"
language: "go"
architecture: "clean"
description: "Builtin minimal Go template"
tags: ["go", "minimal"]
inputs:
  - id: project_name
    prompt: "Project name?"
    type: string
    required: true
    validate: "^[a-zA-Z][a-zA-Z0-9_-]*$"

  - id: orm
    prompt: "ORM?"
    type: enum
    options: [gorm, none]
    default: none

files: []

steps:
  - name: "go mod tidy"
    run: "go mod tidy"

  - name: "go get gorm.io/gorm"
    run: "go get gorm.io/gorm"
    when: orm == "gorm"

